<!DOCTYPE html>
<html lang="en-US">
    <head>
        <title>weather app</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="./CSS/style.css">
        <link rel="icon" href="./assets/images/favicon.png">
        <meta name="author" content="">
        <meta name="description" content="">
    </head>
    <body>


        <div class="card">
            <!-- search -->
            <div class="search">
                <input type="text" placeholder="enter city name" spellcheck="false">
                <button> <img src="./assets/images/search.png"> </button>
            </div>

            <!-- error message -->
             <div class="error">
                <p>Invalid city name!</p>
             </div>
            <!-- weather -->
             <div class="weather">
                <img src="./assets/images/rain.png" class="weather-icon">
                <h1 class="temp">12°C</h1>
                <h2 class="city">London</h2>

                <!-- weather more details -->
                 <div class="details">

                    <div class="col">
                        <img src="./assets/images/humidity.png">
                        <div>
                            <p class="humidity">43 %</p>
                            <p>Humidity</p>
                        </div>
                    </div>

                    <div class="col">
                        <img src="./assets/images/wind.png">
                        <div>
                            <p class="wind">12 km/h</p>
                            <p>Wind Speed</p>
                        </div>
                    </div>

                 </div>
             </div>
        </div>


        <script type="text/javascript" src="./JS/main.js"></script>
    </body>
</html>
